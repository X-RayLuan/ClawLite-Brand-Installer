name: Build & Release

on:
  release:
    types: [published]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build on easyclaw-releases
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh workflow run build.yml --repo ybgwon96/easyclaw-releases -f tag="${{ github.event.release.tag_name }}"
